name: CMT Source Check

on:
  pull_request:
    paths:
      - "cmt-source/**"
      - ".github/workflows/cmt-source-check.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cmt-source
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: cmt-source/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build source
        run: npm run build > build.log 2>&1

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cmt-build-log
          path: cmt-source/build.log
          if-no-files-found: ignore

      - name: Test rendered HTML
        run: node --test tests/rendered-html.test.mjs

      - name: Test strict search logic
        run: node --experimental-strip-types --test tests/search-logic.test.mjs

      - name: Validate build artifact
        run: npm run validate:artifact

      - name: Export static preview
        run: rm -rf static-preview && bash tools/export-static-cmt.sh static-preview

      - name: Upload static preview
        uses: actions/upload-artifact@v4
        with:
          name: cmt-static-preview
          path: cmt-source/static-preview
          if-no-files-found: error
