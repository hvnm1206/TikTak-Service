name: CMT Source Check

on:
  pull_request:
    paths:
      - "cmt-source/**"
      - ".github/workflows/cmt-source-check.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cmt-source
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: cmt-source/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run full build and tests
        run: npm test

      - name: Validate build artifact
        run: npm run validate:artifact
