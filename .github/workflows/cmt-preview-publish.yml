name: Build CMT Preview Branch

on:
  push:
    branches:
      - agent/cmt-preview-publish
    paths:
      - "cmt-source/**"
      - ".github/cmt-preview-trigger"
      - ".github/workflows/cmt-preview-publish.yml"

permissions:
  contents: write

jobs:
  publish-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout preview branch
        uses: actions/checkout@v4
        with:
          ref: agent/cmt-preview-publish
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: cmt-source/package-lock.json

      - name: Install dependencies
        working-directory: cmt-source
        run: npm ci

      - name: Build and export preview
        run: |
          rm -rf cmt-preview
          bash cmt-source/tools/export-static-cmt.sh "$GITHUB_WORKSPACE/cmt-preview"

      - name: Commit generated preview
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cmt-preview
          if git diff --cached --quiet; then
            echo "Preview is already up to date."
            exit 0
          fi
          git commit -m "Build refreshed TikTak CMT preview"
          git push origin HEAD:agent/cmt-preview-publish
